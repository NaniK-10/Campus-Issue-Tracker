<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Campus Issue Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link th:href="@{/css/landing.css}" rel="stylesheet">
    <style>
        /* ===== Login page specific styles ===== */
        .login-wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
        }

        .login-card {
            background: rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 46px 42px;
            color: white;
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.13);
            box-shadow: 0 32px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 440px;
            animation: cardPop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.97);
        }

        @keyframes cardPop {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-logo {
            height: 56px;
            width: auto;
            filter: drop-shadow(0 0 14px rgba(77,163,255,0.5));
            margin-bottom: 6px;
        }

        .login-title {
            font-size: 26px;
            font-weight: 900;
            color: white;
            margin: 0 0 4px;
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 28px;
        }

        /* Form controls */
        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.75);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 15px;
            pointer-events: none;
            transition: color 0.25s;
        }

        .field-input-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 15px;
            transition: color 0.25s;
            background: none;
            border: none;
            padding: 0;
        }

        .field-input-wrap .toggle-pw:hover { color: rgba(255,255,255,0.85); }

        .form-ctrl {
            width: 100%;
            padding: 13px 44px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-ctrl::placeholder { color: rgba(255,255,255,0.3); }

        .form-ctrl:focus {
            background: rgba(255,255,255,0.12);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(77,163,255,0.18);
            color: white;
        }

        .form-ctrl:focus + .field-icon,
        .field-input-wrap:focus-within .field-icon {
            color: var(--accent);
        }

        /* Password strength */
        .strength-bar-wrap {
            margin-top: 10px;
            display: none;
        }

        .strength-bar-track {
            height: 5px;
            background: rgba(255,255,255,0.10);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .strength-bar-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .strength-label {
            font-size: 12px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .strength-hints {
            margin-top: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .hint-chip {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.45);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .hint-chip.ok {
            background: rgba(34,197,94,0.15);
            border-color: rgba(34,197,94,0.35);
            color: #4ade80;
        }

        /* Submit button */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.15);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 32px rgba(77,163,255,0.45);
        }

        .btn-login:hover::before { opacity: 1; }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Alerts */
        .login-alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .login-alert-error {
            background: rgba(239,68,68,0.18);
            border: 1px solid rgba(239,68,68,0.35);
            color: #fca5a5;
        }

        .login-alert-success {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }

        /* Divider */
        .login-divider {
            text-align: center;
            color: rgba(255,255,255,0.25);
            font-size: 13px;
            margin: 22px 0 18px;
            position: relative;
        }

        .login-divider::before, .login-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(255,255,255,0.10);
        }

        .login-divider::before { left: 0; }
        .login-divider::after  { right: 0; }

        .text-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .text-link:hover { color: #fff; text-decoration: underline; }

        /* Back to home */
        .back-home {
            position: fixed;
            top: 20px;
            left: 24px;
            z-index: 20;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            padding: 8px 16px;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            transition: all 0.25s ease;
        }

        .back-home:hover {
            color: white;
            background: rgba(255,255,255,0.14);
        }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; border-radius: 20px; }
        }
    </style>
</head>

<body>
    <!-- Background -->
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>
    <div class="glow-orb glow-orb-1" aria-hidden="true"></div>
    <div class="glow-orb glow-orb-2" aria-hidden="true"></div>

    <!-- Back to home -->
    <a href="/" class="back-home">
        <i class="fa fa-arrow-left"></i> Home
    </a>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo + title -->
            <div class="text-center mb-4">
                <img th:src="@{/images/iitp-logo.png}" alt="IIT Patna" class="login-logo"/>
                <div class="login-title">Welcome Back</div>
                <div class="login-subtitle">Sign in to your IIT Patna account</div>
            </div>

            <!-- Alerts -->
            <div th:if="${param.error}" class="login-alert login-alert-error">
                <i class="fa fa-exclamation-circle"></i>
                Invalid username or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="login-alert login-alert-success">
                <i class="fa fa-check-circle"></i>
                You have been logged out successfully.
            </div>
            <div th:if="${param.verified}" class="login-alert login-alert-success">
                <i class="fa fa-check-circle"></i>
                Email verified! You can now log in.
            </div>
            <div th:if="${param.timeout}" class="login-alert login-alert-error">
                <i class="fa fa-clock"></i>
                Session expired. Please log in again.
            </div>

            <!-- Login form -->
            <form th:action="@{/login}" method="post" id="loginForm" novalidate>

                <!-- Username -->
                <div class="field-group">
                    <label class="field-label" for="username">Username</label>
                    <div class="field-input-wrap">
                        <i class="fa fa-user field-icon"></i>
                        <input type="text" id="username" name="username"
                               class="form-ctrl" placeholder="Enter your username" required autocomplete="username"/>
                    </div>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <label class="field-label" for="password">Password</label>
                    <div class="field-input-wrap">
                        <i class="fa fa-lock field-icon"></i>
                        <input type="password" id="password" name="password"
                               class="form-ctrl" placeholder="Enter your password" required autocomplete="current-password"/>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show/hide password">
                            <i class="fa fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fa fa-sign-in-alt me-2"></i> Sign In
                </button>
            </form>

            <div class="login-divider">or</div>

            <p class="text-center mb-0" style="color:rgba(255,255,255,0.5); font-size:14px;">
                Don't have an account?
                <a href="/signup" class="text-link">Create Account</a>
            </p>
        </div>
    </div>

    <!-- Parallax -->
    <script>
    (function () {
        const bg = document.querySelector(".bg-layer");
        if (!bg) return;
        let latestY = 0, ticking = false;
        function update() {
            ticking = false;
            bg.style.transform = `translate3d(0,${latestY*0.18}px,0) scale(1.06)`;
        }
        window.addEventListener("scroll", () => {
            latestY = window.scrollY || 0;
            if (!ticking) { ticking = true; requestAnimationFrame(update); }
        }, { passive: true });
    })();
    </script>

    <!-- Toggle password visibility -->
    <script>
    document.getElementById('togglePw').addEventListener('click', function () {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'fa fa-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'fa fa-eye';
        }
    });
    </script>
</body>
</html>
